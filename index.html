<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rift Runner - Level 1</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: #18202e;
      --panel-strong: #25344a;
      --ink: #eef7ff;
      --accent: #ffd257;
      --danger: #ef6a5b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, #1f3144 0%, #315a68 48%, #244333 100%);
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    .shell {
      width: min(100vw - 24px, 1000px);
      display: grid;
      gap: 10px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      padding: 8px 10px;
      background: rgba(18, 25, 37, 0.72);
      border: 2px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 22px;
      height: 22px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      flex: 0 0 auto;
      border: 2px solid #0b1018;
      background: #4ec7a8;
    }

    .brand-mark span:nth-child(1),
    .brand-mark span:nth-child(5),
    .brand-mark span:nth-child(9) {
      background: #ffd257;
    }

    .brand-mark span:nth-child(3),
    .brand-mark span:nth-child(7) {
      background: #f07f56;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      min-height: 34px;
      border: 2px solid #0b1018;
      border-radius: 6px;
      background: var(--accent);
      color: #15120a;
      font-weight: 800;
      cursor: pointer;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.16);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.18);
    }

    .stage {
      position: relative;
      border: 4px solid #0d121c;
      background: #172433;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #8cd6e8;
    }

    .touch {
      position: absolute;
      inset: auto 12px 12px 12px;
      display: none;
      justify-content: space-between;
      pointer-events: none;
    }

    .pad {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .pad button {
      width: 48px;
      height: 48px;
      min-height: 48px;
      border-radius: 8px;
      background: rgba(255, 242, 183, 0.88);
      color: #1b2431;
      font-size: 22px;
      line-height: 1;
      touch-action: none;
    }

    @media (pointer: coarse) {
      .touch {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar" aria-label="Game controls">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></span>
        <span>Rift Runner</span>
      </div>
      <div class="actions">
        <button id="restartButton" type="button">Restart</button>
      </div>
    </div>
    <section class="stage" aria-label="Rift Runner game canvas">
      <canvas id="game" width="960" height="540"></canvas>
      <div class="touch" aria-hidden="true">
        <div class="pad">
          <button type="button" data-touch="left">&lt;</button>
          <button type="button" data-touch="right">&gt;</button>
        </div>
        <div class="pad">
          <button type="button" data-touch="jump">^</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      const WIDTH = canvas.width;
      const HEIGHT = canvas.height;
      const TILE = 32;
      const ROWS = 17;
      const COLS = 210;
      const LEVEL_WIDTH = COLS * TILE;
      const GRAVITY = 1500;
      const MAX_FALL = 900;

      const TILE_EMPTY = 0;
      const TILE_GRASS = 1;
      const TILE_DIRT = 2;
      const TILE_BRICK = 3;
      const TILE_STONE = 4;
      const TILE_BEAM = 5;

      const keys = new Set();
      const virtual = { left: false, right: false };
      let cameraX = 0;
      let lastTime = performance.now();
      let animTime = 0;

      const game = {
        score: 0,
        coins: 0,
        lives: 3,
        time: 300,
        status: "play",
        message: "",
        bonusAwarded: false
      };

      const player = {
        x: 86,
        y: 360,
        w: 26,
        h: 31,
        vx: 0,
        vy: 0,
        grounded: false,
        coyote: 0,
        jumpBuffer: 0,
        facing: 1,
        invuln: 0
      };

      const flag = {
        x: (COLS - 8) * TILE,
        y: 160,
        w: 40,
        h: 320
      };

      const gaps = [
        [28, 31],
        [51, 54],
        [80, 84],
        [122, 126],
        [154, 159]
      ];

      let tiles = [];
      let coins = [];
      let enemies = [];

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function overlaps(a, b) {
        return a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y;
      }

      function inGap(col) {
        return gaps.some(([start, end]) => col >= start && col <= end);
      }

      function setTile(col, row, type) {
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
          tiles[row][col] = type;
        }
      }

      function fillTiles(fromCol, toCol, row, type) {
        for (let col = fromCol; col <= toCol; col += 1) {
          setTile(col, row, type);
        }
      }

      function createTiles() {
        tiles = Array.from({ length: ROWS }, () => Array(COLS).fill(TILE_EMPTY));

        for (let col = 0; col < COLS; col += 1) {
          if (!inGap(col)) {
            setTile(col, 15, TILE_GRASS);
            setTile(col, 16, TILE_DIRT);
          }
        }

        [
          [16, 21, 12, TILE_STONE],
          [34, 39, 10, TILE_BEAM],
          [60, 66, 13, TILE_STONE],
          [90, 95, 11, TILE_BEAM],
          [111, 118, 9, TILE_STONE],
          [137, 144, 12, TILE_BEAM],
          [170, 178, 11, TILE_STONE],
          [187, 194, 13, TILE_BEAM]
        ].forEach(([a, b, row, type]) => fillTiles(a, b, row, type));

        [
          [11, 11], [12, 11], [13, 11],
          [24, 10], [25, 10], [26, 10],
          [43, 12], [44, 12], [45, 12], [46, 12],
          [72, 10], [73, 10], [74, 10],
          [101, 13], [102, 13], [103, 13],
          [130, 11], [131, 11], [132, 11], [133, 11],
          [149, 9], [150, 9], [151, 9],
          [183, 8], [184, 8], [185, 8]
        ].forEach(([col, row]) => setTile(col, row, TILE_BRICK));

        for (let step = 0; step < 5; step += 1) {
          fillTiles(198 + step, 202, 14 - step, TILE_STONE);
        }
      }

      function addCoin(col, row, offsetY = 0) {
        coins.push({
          x: col * TILE + TILE / 2,
          y: row * TILE + TILE / 2 + offsetY,
          r: 10,
          collected: false
        });
      }

      function addCoinLine(startCol, endCol, row) {
        for (let col = startCol; col <= endCol; col += 1) {
          addCoin(col, row);
        }
      }

      function createCoins() {
        coins = [];
        addCoinLine(6, 12, 12);
        addCoinLine(16, 21, 10);
        addCoinLine(34, 39, 8);
        addCoinLine(56, 61, 11);
        addCoinLine(90, 95, 9);
        addCoinLine(111, 118, 7);
        addCoinLine(137, 144, 10);
        addCoinLine(170, 178, 9);
        addCoinLine(187, 194, 11);
        [[30, 11], [31, 10], [52, 9], [53, 9], [82, 8], [83, 8], [124, 8], [125, 8], [156, 9], [158, 9]].forEach(([col, row]) => addCoin(col, row));
      }

      function enemy(col, row, speed) {
        return {
          x: col * TILE,
          y: row * TILE - 24,
          w: 28,
          h: 24,
          vx: speed,
          vy: 0,
          alive: true,
          stomped: 0
        };
      }

      function createEnemies() {
        enemies = [
          enemy(22, 15, -55),
          enemy(42, 15, -65),
          enemy(64, 13, -50),
          enemy(75, 15, -70),
          enemy(96, 15, -65),
          enemy(116, 9, -45),
          enemy(135, 15, -70),
          enemy(146, 12, -55),
          enemy(181, 15, -70),
          enemy(191, 13, -48)
        ];
      }

      function resetPlayer() {
        Object.assign(player, {
          x: 86,
          y: 360,
          w: 26,
          h: 31,
          vx: 0,
          vy: 0,
          grounded: false,
          coyote: 0,
          jumpBuffer: 0,
          facing: 1,
          invuln: 1.2
        });
        cameraX = 0;
      }

      function restartGame() {
        createTiles();
        createCoins();
        createEnemies();
        game.score = 0;
        game.coins = 0;
        game.lives = 3;
        game.time = 300;
        game.status = "play";
        game.message = "";
        game.bonusAwarded = false;
        resetPlayer();
      }

      function tileAt(col, row) {
        if (col < 0 || col >= COLS) return TILE_STONE;
        if (row < 0 || row >= ROWS) return TILE_EMPTY;
        return tiles[row][col];
      }

      function isSolidTile(type) {
        return type === TILE_GRASS ||
          type === TILE_DIRT ||
          type === TILE_BRICK ||
          type === TILE_STONE ||
          type === TILE_BEAM;
      }

      function isSolidAtPixel(x, y) {
        return isSolidTile(tileAt(Math.floor(x / TILE), Math.floor(y / TILE)));
      }

      function moveBody(body, dt) {
        const result = { hitWall: false, hitHead: false, grounded: false };

        body.x += body.vx * dt;
        if (body.vx > 0) {
          const col = Math.floor((body.x + body.w) / TILE);
          const rowA = Math.floor(body.y / TILE);
          const rowB = Math.floor((body.y + body.h - 1) / TILE);
          for (let row = rowA; row <= rowB; row += 1) {
            if (isSolidTile(tileAt(col, row))) {
              body.x = col * TILE - body.w - 0.01;
              body.vx = 0;
              result.hitWall = true;
              break;
            }
          }
        } else if (body.vx < 0) {
          const col = Math.floor(body.x / TILE);
          const rowA = Math.floor(body.y / TILE);
          const rowB = Math.floor((body.y + body.h - 1) / TILE);
          for (let row = rowA; row <= rowB; row += 1) {
            if (isSolidTile(tileAt(col, row))) {
              body.x = (col + 1) * TILE + 0.01;
              body.vx = 0;
              result.hitWall = true;
              break;
            }
          }
        }

        body.y += body.vy * dt;
        if (body.vy > 0) {
          const row = Math.floor((body.y + body.h) / TILE);
          const colA = Math.floor(body.x / TILE);
          const colB = Math.floor((body.x + body.w - 1) / TILE);
          for (let col = colA; col <= colB; col += 1) {
            if (isSolidTile(tileAt(col, row))) {
              body.y = row * TILE - body.h - 0.01;
              body.vy = 0;
              body.grounded = true;
              result.grounded = true;
              break;
            }
          }
        } else if (body.vy < 0) {
          const row = Math.floor(body.y / TILE);
          const colA = Math.floor(body.x / TILE);
          const colB = Math.floor((body.x + body.w - 1) / TILE);
          for (let col = colA; col <= colB; col += 1) {
            if (isSolidTile(tileAt(col, row))) {
              body.y = (row + 1) * TILE + 0.01;
              body.vy = 70;
              result.hitHead = true;
              break;
            }
          }
        }

        return result;
      }

      function queueJump() {
        if (game.status === "play") {
          player.jumpBuffer = 0.14;
        }
      }

      function hurtPlayer() {
        if (player.invuln > 0 || game.status !== "play") return;
        game.lives -= 1;
        if (game.lives <= 0) {
          game.status = "over";
          game.message = "GAME OVER";
          player.vx = 0;
          player.vy = 0;
        } else {
          resetPlayer();
        }
      }

      function updatePlayer(dt) {
        const left = keys.has("ArrowLeft") || keys.has("KeyA") || virtual.left;
        const right = keys.has("ArrowRight") || keys.has("KeyD") || virtual.right;
        const direction = (right ? 1 : 0) - (left ? 1 : 0);
        const acceleration = player.grounded ? 1600 : 950;
        const maxSpeed = player.grounded ? 255 : 235;
        const friction = player.grounded ? 0.82 : 0.96;

        if (direction !== 0) {
          player.vx += direction * acceleration * dt;
          player.facing = direction;
        } else {
          player.vx *= Math.pow(friction, dt * 60);
          if (Math.abs(player.vx) < 3) player.vx = 0;
        }

        player.vx = clamp(player.vx, -maxSpeed, maxSpeed);
        player.vy = clamp(player.vy + GRAVITY * dt, -900, MAX_FALL);

        if (player.grounded) {
          player.coyote = 0.09;
        } else {
          player.coyote = Math.max(0, player.coyote - dt);
        }

        player.jumpBuffer = Math.max(0, player.jumpBuffer - dt);
        if (player.jumpBuffer > 0 && (player.grounded || player.coyote > 0)) {
          player.vy = -570;
          player.grounded = false;
          player.coyote = 0;
          player.jumpBuffer = 0;
        }

        player.grounded = false;
        moveBody(player, dt);
        player.invuln = Math.max(0, player.invuln - dt);

        if (player.y > HEIGHT + 120) {
          hurtPlayer();
        }
      }

      function updateEnemies(dt) {
        for (const bug of enemies) {
          if (!bug.alive) {
            bug.stomped -= dt;
            continue;
          }

          bug.vy = clamp(bug.vy + GRAVITY * dt, -900, MAX_FALL);
          bug.grounded = false;
          const moved = moveBody(bug, dt);
          const frontX = bug.vx > 0 ? bug.x + bug.w + 3 : bug.x - 3;
          const footY = bug.y + bug.h + 5;
          if (moved.hitWall || !isSolidAtPixel(frontX, footY)) {
            bug.vx = bug.vx === 0 ? -55 : -bug.vx;
          }

          if (overlaps(player, bug)) {
            const playerBottom = player.y + player.h;
            const stomp = player.vy > 0 && playerBottom - bug.y < 18;
            if (stomp) {
              bug.alive = false;
              bug.stomped = 0.45;
              player.vy = -350;
              player.grounded = false;
              game.score += 200;
            } else {
              hurtPlayer();
            }
          }
        }
      }

      function updateCoins() {
        for (const coin of coins) {
          if (coin.collected) continue;
          const coinBox = {
            x: coin.x - coin.r,
            y: coin.y - coin.r,
            w: coin.r * 2,
            h: coin.r * 2
          };
          if (overlaps(player, coinBox)) {
            coin.collected = true;
            game.coins += 1;
            game.score += 100;
          }
        }
      }

      function updateFlag() {
        const flagBox = { x: flag.x - 8, y: flag.y, w: flag.w + 22, h: flag.h };
        if (overlaps(player, flagBox)) {
          game.status = "win";
          game.message = "RUN CLEAR";
          player.vx = 0;
          if (!game.bonusAwarded) {
            game.score += Math.max(0, Math.ceil(game.time)) * 10;
            game.bonusAwarded = true;
          }
        }
      }

      function update(dt) {
        animTime += dt;
        if (game.status !== "play") return;

        game.time = Math.max(0, game.time - dt);
        if (game.time <= 0) {
          game.status = "over";
          game.message = "TIME UP";
          return;
        }

        updatePlayer(dt);
        updateEnemies(dt);
        updateCoins();
        updateFlag();

        cameraX = clamp(player.x + player.w / 2 - WIDTH * 0.42, 0, LEVEL_WIDTH - WIDTH);
      }

      function px(x) {
        return Math.round(x - cameraX);
      }

      function drawRect(x, y, w, h, color) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
      }

      function drawBackground() {
        const sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
        sky.addColorStop(0, "#82d7ef");
        sky.addColorStop(0.62, "#c8ecdb");
        sky.addColorStop(1, "#79aa68");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        const sunX = 760 - (cameraX * 0.08 % 180);
        drawRect(sunX, 52, 56, 56, "#ffe68a");
        drawRect(sunX + 12, 40, 32, 12, "#fff1a8");
        drawRect(sunX + 12, 108, 32, 12, "#ffc96a");

        for (let i = 0; i < 9; i += 1) {
          const base = i * 370 - (cameraX * 0.22 % 370);
          drawRect(base + 40, 74 + (i % 3) * 18, 64, 20, "#f3fbff");
          drawRect(base + 72, 54 + (i % 3) * 18, 42, 20, "#f3fbff");
          drawRect(base + 106, 82 + (i % 3) * 18, 46, 16, "#dff3f2");
        }

        for (let i = 0; i < 12; i += 1) {
          const x = i * 260 - (cameraX * 0.12 % 260);
          drawRect(x, 350, 170, 130, "#6bb06d");
          drawRect(x + 32, 318, 92, 44, "#78bd78");
          drawRect(x + 72, 290, 44, 32, "#86c782");
        }

        for (let i = 0; i < 16; i += 1) {
          const x = i * 220 - (cameraX * 0.38 % 220);
          drawRect(x, 414, 80, 70, "#517f6a");
          drawRect(x + 12, 390, 56, 28, "#60977d");
          drawRect(x + 28, 374, 24, 18, "#70a98b");
        }
      }

      function drawTile(type, sx, sy) {
        if (type === TILE_GRASS) {
          drawRect(sx, sy, TILE, TILE, "#7b5735");
          drawRect(sx, sy, TILE, 8, "#4ec75f");
          drawRect(sx + 3, sy + 9, 7, 5, "#9d7041");
          drawRect(sx + 20, sy + 18, 8, 4, "#5f422b");
        } else if (type === TILE_DIRT) {
          drawRect(sx, sy, TILE, TILE, "#69452d");
          drawRect(sx + 6, sy + 7, 6, 5, "#805333");
          drawRect(sx + 20, sy + 18, 7, 5, "#4f3526");
        } else if (type === TILE_BRICK) {
          drawRect(sx, sy, TILE, TILE, "#ba624d");
          drawRect(sx, sy + 14, TILE, 3, "#733733");
          drawRect(sx + 15, sy, 3, 14, "#733733");
          drawRect(sx + 5, sy + 20, 3, 12, "#733733");
          drawRect(sx + 3, sy + 3, 7, 4, "#df8870");
        } else if (type === TILE_STONE) {
          drawRect(sx, sy, TILE, TILE, "#667382");
          drawRect(sx + 2, sy + 2, TILE - 4, 5, "#9aa8b6");
          drawRect(sx + 4, sy + 11, 10, 5, "#4c5968");
          drawRect(sx + 18, sy + 22, 9, 5, "#4c5968");
        } else if (type === TILE_BEAM) {
          drawRect(sx, sy, TILE, TILE, "#d3a345");
          drawRect(sx, sy + 6, TILE, 5, "#f0c468");
          drawRect(sx, sy + 23, TILE, 4, "#8c5d2f");
          drawRect(sx + 7, sy + 12, 6, 6, "#936632");
          drawRect(sx + 22, sy + 15, 5, 5, "#936632");
        }
      }

      function drawLevel() {
        const startCol = Math.max(0, Math.floor(cameraX / TILE) - 1);
        const endCol = Math.min(COLS - 1, Math.floor((cameraX + WIDTH) / TILE) + 1);
        for (let row = 0; row < ROWS; row += 1) {
          for (let col = startCol; col <= endCol; col += 1) {
            const type = tileAt(col, row);
            if (type !== TILE_EMPTY) {
              drawTile(type, col * TILE - cameraX, row * TILE);
            }
          }
        }
      }

      function drawCoin(coin) {
        if (coin.collected) return;
        const wobble = Math.abs(Math.sin(animTime * 8 + coin.x * 0.01));
        const w = 6 + wobble * 14;
        const sx = px(coin.x) - w / 2;
        const sy = coin.y - 10 + Math.sin(animTime * 4 + coin.x) * 2;
        drawRect(sx, sy, w, 20, "#ffd257");
        drawRect(sx + 2, sy + 3, Math.max(2, w - 4), 4, "#fff0a3");
        drawRect(sx + Math.max(1, w - 4), sy + 11, 3, 7, "#bb7d26");
      }

      function drawEnemy(bug) {
        const sx = px(bug.x);
        const sy = bug.y;
        if (!bug.alive && bug.stomped <= 0) return;
        if (!bug.alive) {
          drawRect(sx + 2, sy + 16, bug.w - 4, 8, "#793744");
          drawRect(sx + 6, sy + 20, bug.w - 12, 4, "#e48b4b");
          return;
        }
        drawRect(sx + 3, sy + 7, bug.w - 6, bug.h - 7, "#d95757");
        drawRect(sx + 8, sy + 2, bug.w - 16, 9, "#ff935e");
        drawRect(sx + 7, sy + 12, 5, 5, "#2b1c23");
        drawRect(sx + 17, sy + 12, 5, 5, "#2b1c23");
        drawRect(sx + 2, sy + bug.h - 4, 7, 4, "#2b1c23");
        drawRect(sx + bug.w - 9, sy + bug.h - 4, 7, 4, "#2b1c23");
      }

      function drawPlayer() {
        if (player.invuln > 0 && Math.floor(animTime * 16) % 2 === 0) return;
        const sx = px(player.x);
        const sy = Math.round(player.y);
        drawRect(sx + 5, sy + 25, 7, 6, "#222c35");
        drawRect(sx + 16, sy + 25, 8, 6, "#222c35");
        drawRect(sx + 4, sy + 12, 18, 16, "#39b69b");
        drawRect(sx + 8, sy + 7, 16, 12, "#f1bf74");
        drawRect(sx + 9, sy + 2, 14, 7, "#2b556b");
        drawRect(sx + 11, sy + 9, 9, 4, "#1c3444");
        drawRect(sx + (player.facing > 0 ? 22 : 1), sy + 15, 4, 9, "#f1bf74");
        drawRect(sx + (player.facing > 0 ? 0 : 22), sy + 13, 4, 8, "#227f73");
        drawRect(sx + 8, sy + 18, 5, 9, "#237369");
        drawRect(sx + 16, sy + 18, 5, 9, "#237369");
        drawRect(sx + 6, sy + 12, 14, 3, "#8ae5c7");
      }

      function drawFlag() {
        const sx = px(flag.x);
        drawRect(sx, flag.y, 7, flag.h, "#f7f2d8");
        drawRect(sx + 7, flag.y + 18, 54, 38, "#7b5ad7");
        drawRect(sx + 13, flag.y + 26, 34, 9, "#53d0c0");
        drawRect(sx + 48, flag.y + 18, 13, 38, "#4b378f");
        drawRect(sx - 11, flag.y + flag.h, 29, 8, "#d7c58d");
      }

      function drawHud() {
        drawRect(0, 0, WIDTH, 45, "rgba(13, 18, 28, 0.74)");
        ctx.font = "18px Consolas, Monaco, monospace";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#fff7d6";
        ctx.fillText("SCORE " + String(game.score).padStart(6, "0"), 24, 23);
        ctx.fillText("COINS " + String(game.coins).padStart(2, "0"), 244, 23);
        ctx.fillText("TIME " + String(Math.ceil(game.time)).padStart(3, "0"), 432, 23);
        ctx.fillText("LIVES " + game.lives, 612, 23);
        ctx.fillText("LEVEL 1", 762, 23);
      }

      function drawOverlay() {
        if (game.status === "play") return;
        drawRect(0, 0, WIDTH, HEIGHT, "rgba(9, 14, 21, 0.48)");
        drawRect(286, 184, 388, 128, "#172435");
        drawRect(286, 184, 388, 6, "#ffd257");
        drawRect(286, 306, 388, 6, "#0b1018");
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#fff7d6";
        ctx.font = "42px Consolas, Monaco, monospace";
        ctx.fillText(game.message, WIDTH / 2, 230);
        ctx.font = "20px Consolas, Monaco, monospace";
        ctx.fillStyle = "#9ee8d7";
        ctx.fillText("SCORE " + game.score, WIDTH / 2, 274);
        ctx.textAlign = "left";
      }

      function render() {
        drawBackground();
        drawFlag();
        drawLevel();
        for (const coin of coins) drawCoin(coin);
        for (const bug of enemies) drawEnemy(bug);
        drawPlayer();
        drawHud();
        drawOverlay();
      }

      function frame(now) {
        const dt = Math.min(0.033, (now - lastTime) / 1000);
        lastTime = now;
        update(dt);
        render();
        requestAnimationFrame(frame);
      }

      document.addEventListener("keydown", (event) => {
        if (["ArrowLeft", "ArrowRight", "ArrowUp", "Space"].includes(event.code)) {
          event.preventDefault();
        }
        keys.add(event.code);
        if (event.code === "Space" || event.code === "ArrowUp" || event.code === "KeyW") {
          if (!event.repeat) queueJump();
        }
        if (event.code === "KeyR" || event.code === "Enter") {
          restartGame();
        }
      });

      document.addEventListener("keyup", (event) => {
        keys.delete(event.code);
      });

      document.getElementById("restartButton").addEventListener("click", restartGame);

      for (const button of document.querySelectorAll("[data-touch]")) {
        const action = button.getAttribute("data-touch");
        const press = (event) => {
          event.preventDefault();
          if (action === "jump") {
            queueJump();
          } else {
            virtual[action] = true;
          }
        };
        const release = (event) => {
          event.preventDefault();
          if (action !== "jump") {
            virtual[action] = false;
          }
        };
        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("pointerleave", release);
      }

      restartGame();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
